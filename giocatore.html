<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Profilo giocatore ICV: notizie, mercato e discussioni della Community in un unico punto.">
<title>Giocatore · ICV Scout</title>
<link rel="canonical" href="https://ilcalciodivince.com/giocatori">
<meta name="theme-color" content="#080808">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#c4962a;--gold2:#e8b84b;--bg:#060606;--panel:#151515;--line:rgba(255,255,255,.09);--text:#f5f2eb;--muted:rgba(255,255,255,.6);--soft:rgba(255,255,255,.38)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 48% -10%,rgba(196,150,42,.16),transparent 30%),var(--bg);color:var(--text);font-family:Barlow,sans-serif}header{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;min-height:64px;padding:10px 22px;border-bottom:1px solid rgba(196,150,42,.2);background:rgba(6,6,6,.92);backdrop-filter:blur(18px)}.brand{text-decoration:none;color:var(--gold2);font:24px/1 "Bebas Neue";letter-spacing:2px}.brand small{display:block;color:var(--muted);font:800 9px "Barlow Condensed";letter-spacing:2px}nav{display:flex;gap:7px;flex-wrap:wrap}nav a{padding:8px 11px;border:1px solid var(--line);border-radius:999px;color:var(--muted);text-decoration:none;font:800 11px "Barlow Condensed";letter-spacing:1.4px;text-transform:uppercase}nav a:hover{border-color:rgba(196,150,42,.5);color:var(--gold2)}main{max-width:1120px;margin:auto;padding:54px 20px 80px}.hero{display:grid;grid-template-columns:112px 1fr;gap:26px;align-items:center;padding-bottom:34px;border-bottom:1px solid var(--line)}.avatar{width:112px;aspect-ratio:1;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(196,150,42,.45);background:linear-gradient(145deg,#2b2517,#111);color:var(--gold2);font:48px "Bebas Neue"}.eyebrow{color:var(--gold2);font:900 12px "Barlow Condensed";letter-spacing:3px;text-transform:uppercase}.hero h1{margin:5px 0 8px;font:clamp(52px,8vw,92px)/.9 "Bebas Neue";letter-spacing:2px}.summary{display:flex;gap:18px;flex-wrap:wrap;color:var(--muted);font:700 13px "Barlow Condensed";text-transform:uppercase;letter-spacing:1px}.tabs{display:flex;gap:8px;overflow:auto;padding:22px 0}.tabs button{border:1px solid var(--line);border-radius:6px;background:#111;color:var(--muted);padding:10px 14px;font:900 12px "Barlow Condensed";letter-spacing:1.5px;text-transform:uppercase;cursor:pointer}.tabs button.active{color:#090909;background:var(--gold2);border-color:var(--gold2)}.section{display:none}.section.active{display:block}.section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:8px 0 14px}.section h2{margin:0;font:36px "Bebas Neue";letter-spacing:1px}.count{color:var(--soft);font:800 11px "Barlow Condensed";letter-spacing:1.5px;text-transform:uppercase}.list{border-top:1px solid var(--line)}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;padding:20px 2px;border-bottom:1px solid var(--line);color:inherit;text-decoration:none}.row:hover h3{color:var(--gold2)}.row h3{margin:0 0 7px;font:800 20px/1.15 "Barlow Condensed"}.row p{margin:0;color:var(--muted);line-height:1.5;max-width:760px}.meta{margin-top:10px;color:var(--soft);font:800 11px "Barlow Condensed";letter-spacing:1px;text-transform:uppercase}.badge{align-self:start;border:1px solid #747980;border-radius:999px;padding:5px 8px;color:#b8bcc1;font:900 10px "Barlow Condensed";letter-spacing:1px;text-transform:uppercase}.overview{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.metric{min-height:130px;padding:18px;border:1px solid var(--line);border-radius:8px;background:var(--panel)}.metric strong{display:block;color:var(--gold2);font:42px "Bebas Neue"}.metric span{color:var(--muted);font:800 12px "Barlow Condensed";letter-spacing:1.5px;text-transform:uppercase}.related{display:flex;gap:8px;flex-wrap:wrap;margin-top:28px}.related a{padding:8px 12px;border:1px solid var(--line);border-radius:999px;color:var(--text);text-decoration:none;font:700 13px "Barlow Condensed"}.empty,.loading{padding:36px 0;color:var(--soft);text-align:center;font:800 13px "Barlow Condensed";letter-spacing:1.5px;text-transform:uppercase}@media(max-width:700px){header{align-items:flex-start;padding:12px 14px}.hero{grid-template-columns:72px 1fr;gap:15px}.avatar{width:72px;font-size:32px}.hero h1{font-size:50px}.overview{grid-template-columns:1fr}.row{grid-template-columns:1fr}.badge{justify-self:start}main{padding:36px 14px 60px}}
.tabs{scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<header><a class="brand" href="/">ICV Scout<small>Il Calcio di Vince</small></a><nav><a href="/">Home</a><a href="/mercato">Mercato</a><a href="/community">Community</a><a href="/#news">News</a></nav></header>
<main>
  <section class="hero"><div class="avatar" id="playerAvatar">ICV</div><div><div class="eyebrow">ICV Player Hub</div><h1 id="playerName">Caricamento</h1><div class="summary" id="playerSummary">Notizie, mercato e Community</div></div></section>
  <div class="tabs" role="tablist"><button class="active" data-tab="overview">Panoramica</button><button data-tab="news">News</button><button data-tab="market">Mercato</button><button data-tab="community">Community</button></div>
  <section class="section active" id="overview"><div class="overview" id="metrics"><div class="loading">Aggiorno il profilo</div></div><div class="related" id="related"></div></section>
  <section class="section" id="news"><div class="section-head"><h2>Ultime notizie</h2><span class="count" id="newsCount"></span></div><div class="list" id="newsList"></div></section>
  <section class="section" id="market"><div class="section-head"><h2>Mercato Board</h2><span class="count" id="marketCount"></span></div><div class="list" id="marketList"></div></section>
  <section class="section" id="community"><div class="section-head"><h2>Discussioni</h2><span class="count" id="communityCount"></span></div><div class="list" id="communityList"></div></section>
</main>
<script>
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]})}function initials(v){return String(v||"ICV").split(/\s+/).slice(0,2).map(function(x){return x[0]}).join("").toUpperCase()}function date(v){var d=new Date(v||0);return isNaN(d)?"Aggiornamento recente":d.toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"})}function empty(v){return"<div class='empty'>"+esc(v)+"</div>"}function setTab(id){document.querySelectorAll(".tabs button").forEach(function(b){b.classList.toggle("active",b.dataset.tab===id)});document.querySelectorAll(".section").forEach(function(s){s.classList.toggle("active",s.id===id)})}document.querySelectorAll(".tabs button").forEach(function(b){b.onclick=function(){setTab(b.dataset.tab)}});
function render(data){var p=data.player,c=data.counts||{};document.title=p.name+" · ICV Scout";document.getElementById("playerName").textContent=p.name;document.getElementById("playerAvatar").textContent=initials(p.name);document.getElementById("playerSummary").textContent="Aggiornato "+date(p.updated_at)+" · "+c.news+" news · "+c.discussions+" discussioni";document.getElementById("metrics").innerHTML=[[c.news,"Notizie collegate"],[c.market,"Segnali mercato"],[c.discussions,"Discussioni Community"]].map(function(x){return"<div class='metric'><strong>"+x[0]+"</strong><span>"+x[1]+"</span></div>"}).join("");document.getElementById("newsCount").textContent=c.news+" contenuti";document.getElementById("marketCount").textContent=c.market+" aggiornamenti";document.getElementById("communityCount").textContent=c.discussions+" conversazioni";document.getElementById("newsList").innerHTML=data.news.length?data.news.map(function(n){return"<a class='row' href='"+esc(n.source_url||"/#news")+"' target='_blank' rel='noopener'><div><h3>"+esc(n.title)+"</h3><p>"+esc(n.body||"")+"</p><div class='meta'>"+esc(n.source||"ICV Scout")+" · "+date(n.created_at)+"</div></div><span class='badge'>News</span></a>"}).join(""):empty("Nessuna notizia collegata");document.getElementById("marketList").innerHTML=data.market.length?data.market.map(function(m){return"<a class='row' href='"+esc(m.source_url||"/mercato")+"' target='_blank' rel='noopener'><div><h3>"+esc(m.note||m.player_name)+"</h3><div class='meta'>"+esc(m.source_name||"ICV")+" · "+date(m.updated_at)+"</div></div><span class='badge'>"+esc(m.deal_stage||m.status||"Monitorata")+"</span></a>"}).join(""):empty("Nessun segnale mercato");document.getElementById("communityList").innerHTML=data.discussions.length?data.discussions.map(function(x){return"<a class='row' href='/community/post/"+esc(x.id)+"'><div><h3>"+esc(x.author&&x.author.display_name||"Community ICV")+"</h3><p>"+esc(x.body)+"</p><div class='meta'>"+date(x.created_at)+"</div></div><span class='badge'>Discussione</span></a>"}).join(""):empty("Apri tu la prima discussione su "+p.name);document.getElementById("related").innerHTML=(data.related||[]).length?"<span class='count'>Giocatori correlati</span>"+data.related.map(function(x){return"<a href='/giocatore?slug="+esc(x.slug)+"'>"+esc(x.name)+"</a>"}).join(""):""}
var slug=new URLSearchParams(location.search).get("slug")||"";fetch("/api/public/players/"+encodeURIComponent(slug)).then(function(r){if(!r.ok)throw new Error("Profilo non trovato");return r.json()}).then(render).catch(function(e){document.getElementById("playerName").textContent="Profilo non disponibile";document.getElementById("metrics").innerHTML=empty(e.message)});
</script>
<script defer src="/assets/analytics.js?v=20260719-1"></script>
</body></html>
