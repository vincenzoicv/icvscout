<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafiche ICV - Il Calcio di Vince</title>
<meta name="description" content="Archivio grafiche ICV Scout per Juventus, mercato, statistiche e contenuti social.">
<link rel="canonical" href="https://ilcalciodivince.com/grafiche">
<meta property="og:url" content="https://ilcalciodivince.com/grafiche">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C4962A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="ICV Scout">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ICV Scout">
<meta name="format-detection" content="telephone=no">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-startup-image" href="/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
<link rel="apple-touch-startup-image" href="/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C4962A;--gold-l:#E8B84B;--black:#050505;--d1:#0b0b0b;--d2:#151515;--white:#f4f1ea;--t2:rgba(255,255,255,.68);--t3:rgba(255,255,255,.42);--bdr:rgba(196,150,42,.18);--bdr2:rgba(255,255,255,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:radial-gradient(circle at 50% 0,rgba(196,150,42,.1),transparent 32%),var(--black);color:var(--white);font-family:Barlow,sans-serif}
body:before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;pointer-events:none}
header{position:sticky;top:0;z-index:10;height:64px;border-bottom:1px solid var(--bdr);background:rgba(5,5,5,.94);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:space-between;padding:0 22px}
.brand{display:flex;flex-direction:column;line-height:.95;text-decoration:none}.brand strong{font-family:"Bebas Neue";font-size:22px;letter-spacing:2.5px;color:var(--gold-l)}.brand span{font-family:"Barlow Condensed";font-size:10px;font-weight:800;letter-spacing:3px;color:var(--t2);text-transform:uppercase}
nav{display:flex;gap:8px;align-items:center}nav a{font-family:"Barlow Condensed";font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t2);text-decoration:none;border:1px solid var(--bdr2);border-radius:6px;padding:9px 12px;background:rgba(255,255,255,.03)}nav a:hover{color:var(--gold-l);border-color:rgba(196,150,42,.35)}
main{max-width:1180px;margin:0 auto;padding:58px 20px 80px}
.hero{margin-bottom:34px}.eyebrow{font-family:"Barlow Condensed";font-size:13px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--gold-l);margin-bottom:10px}.hero h1{font-family:"Bebas Neue";font-size:clamp(64px,12vw,150px);letter-spacing:4px;line-height:.82}.hero p{max-width:560px;margin-top:16px;color:var(--t2);font-size:16px;line-height:1.65}
.bar{width:54px;height:2px;background:var(--gold-l);margin-top:22px}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px}
.card{display:block;min-width:0;background:var(--d2);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease}
.card:hover{transform:translateY(-3px);border-color:rgba(196,150,42,.45);box-shadow:0 18px 44px rgba(0,0,0,.36)}
.card img{display:block;width:100%;aspect-ratio:4/5;object-fit:cover;background:#111}
.card h2{font-family:"Barlow Condensed";font-size:23px;line-height:1.08;font-weight:800;padding:14px 14px 16px;color:var(--white)}
.empty{grid-column:1/-1;border:1px dashed var(--bdr2);border-radius:12px;background:rgba(255,255,255,.025);padding:54px 20px;text-align:center;color:var(--t3);font-family:"Barlow Condensed";font-size:15px;letter-spacing:2px;text-transform:uppercase}
footer{border-top:1px solid var(--bdr);padding:18px 22px;color:var(--t3);font-family:"Barlow Condensed";font-size:11px;letter-spacing:2px;text-transform:uppercase;display:flex;justify-content:space-between;gap:12px}
@media(max-width:720px){header{height:auto;min-height:62px;padding:12px 14px;gap:12px}nav{flex-wrap:wrap;justify-content:flex-end}main{padding:36px 14px 64px}.gallery{grid-template-columns:1fr}.hero h1{font-size:72px}footer{flex-direction:column}}
</style>
</head>
<body>
<header>
  <a class="brand" href="/"><strong>ICV Scout</strong><span>Il Calcio di Vince</span></a>
  <nav>
    <a href="/">Home</a>
    <a href="/#news">News</a>
    <a href="/mercato">Mercato</a>
  </nav>
</header>
<main>
  <section class="hero">
    <div class="eyebrow">Archivio ICV</div>
    <h1>Grafiche</h1>
    <p>Le immagini pubblicate da Il Calcio di Vince, raccolte in una galleria unica.</p>
    <div class="bar"></div>
  </section>
  <section class="gallery" id="graphicsArchive">
    <div class="empty">Caricamento grafiche</div>
  </section>
</main>
<footer>
  <span>© 2026 Il Calcio di Vince · ICV Scout</span>
  <span>@ilcalciodivince_</span>
</footer>
<script>
function esc(value){return String(value == null ? "" : value).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
function renderGraphics(rows){
  var grid = document.getElementById("graphicsArchive");
  var list = Array.isArray(rows) ? rows.filter(function(row){return row && row.visible !== false && row.image_url;}) : [];
  if(!list.length){grid.innerHTML = "<div class='empty'>Nessuna grafica pubblicata</div>";return;}
  grid.innerHTML = list.map(function(item){
    var tag = item.link_url ? "a" : "div";
    var attrs = item.link_url ? " href='" + esc(item.link_url) + "' target='_blank' rel='noopener'" : "";
    return "<" + tag + " class='card'" + attrs + "><img src='" + esc(item.image_url) + "' alt='" + esc(item.title || "Grafica ICV") + "' loading='lazy'><h2>" + esc(item.title || "Grafica ICV") + "</h2></" + tag + ">";
  }).join("");
}
fetch("/api/public/graphics").then(function(response){return response.json();}).then(function(data){renderGraphics(data || []);}).catch(function(){document.getElementById("graphicsArchive").innerHTML = "<div class='empty'>Grafiche non disponibili</div>";});
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("/sw.js").catch(function(){});
  });
}
</script>
</body>
</html>
