<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICV Admin — Pannello Notizie</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C4962A;--gold-l:#E8B84B;--black:#060606;--d2:#151515;--d3:#1c1c1c;--white:#f0f0f0;--t2:rgba(255,255,255,0.65);--t3:rgba(255,255,255,0.38);--bdr:rgba(196,150,42,0.15);--bdr2:rgba(255,255,255,0.06);--green:#4ade80;--red:#f87171;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;opacity:0.025;pointer-events:none;z-index:0;}
header{position:sticky;top:0;z-index:100;height:56px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,6,6,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);}
.hlogo{font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;background:linear-gradient(135deg,#E8B84B,#C4862A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hbadge{font-family:'Barlow Condensed';font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(196,150,42,0.7);text-transform:uppercase;background:rgba(196,150,42,0.08);border:1px solid rgba(196,150,42,0.25);padding:4px 10px;border-radius:4px;}
.back-btn{font-family:'Barlow Condensed';font-size:12px;font-weight:700;letter-spacing:2px;color:rgba(196,150,42,0.75);text-decoration:none;padding:7px 14px;border:1px solid rgba(196,150,42,0.25);border-radius:4px;transition:all 0.2s;text-transform:uppercase;}
.back-btn:hover{color:var(--gold-l);background:rgba(196,150,42,0.07);}
main{max-width:720px;margin:0 auto;padding:32px 20px 60px;position:relative;z-index:1;}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.login-title{font-family:'Bebas Neue';font-size:48px;letter-spacing:3px;background:linear-gradient(135deg,#E8B84B,#C4862A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-sub{font-family:'Barlow Condensed';font-size:13px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;margin-bottom:8px;}
.login-input{width:100%;max-width:300px;background:var(--d2);border:1px solid var(--bdr);border-radius:8px;padding:14px 18px;color:var(--white);font-family:'Barlow Condensed';font-size:18px;letter-spacing:4px;text-align:center;outline:none;transition:border-color 0.2s;}
.login-input:focus{border-color:rgba(196,150,42,0.5);}
.login-btn{width:100%;max-width:300px;padding:14px;background:linear-gradient(135deg,rgba(196,150,42,0.2),rgba(196,150,42,0.1));border:1px solid rgba(196,150,42,0.4);border-radius:8px;font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;color:var(--gold-l);cursor:pointer;transition:all 0.2s;}
.login-btn:hover{background:rgba(196,150,42,0.25);}
.login-err{font-family:'Barlow Condensed';font-size:13px;color:var(--red);letter-spacing:1px;display:none;}
.admin-panel{display:none;}
.form-card{background:var(--d2);border:1px solid var(--bdr);border-radius:12px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden;}
.form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.form-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px;}
.form-group{margin-bottom:16px;}
.form-label{font-family:'Barlow Condensed';font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(196,150,42,0.8);text-transform:uppercase;display:block;margin-bottom:7px;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--d3);border:1px solid var(--bdr2);border-radius:8px;padding:12px 16px;color:var(--white);font-family:'Barlow Condensed';font-size:16px;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:rgba(196,150,42,0.45);}
.form-textarea{min-height:120px;resize:vertical;line-height:1.6;}
.form-select option{background:var(--d3);color:var(--white);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,rgba(196,150,42,0.2),rgba(196,150,42,0.1));border:1px solid rgba(196,150,42,0.4);border-radius:8px;font-family:'Bebas Neue';font-size:22px;letter-spacing:3px;color:var(--gold-l);cursor:pointer;transition:all 0.2s;margin-top:4px;}
.submit-btn:hover{background:rgba(196,150,42,0.25);border-color:rgba(196,150,42,0.6);}
.submit-btn:disabled{opacity:0.4;cursor:default;}
.news-section-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px;}
.news-empty{font-family:'Barlow Condensed';font-size:15px;color:var(--t3);letter-spacing:1px;text-align:center;padding:32px;background:var(--d2);border:1px solid var(--bdr2);border-radius:10px;}
.news-item{background:var(--d2);border:1px solid var(--bdr2);border-radius:10px;padding:16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;transition:all 0.2s;}
.news-item:hover{border-color:rgba(196,150,42,0.2);}
.news-item-content{flex:1;min-width:0;}
.news-cat{font-family:'Barlow Condensed';font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:3px 8px;border-radius:3px;display:inline-block;margin-bottom:7px;}
.cat-juventus{background:rgba(196,150,42,0.12);color:var(--gold-l);border:1px solid rgba(196,150,42,0.25);}
.cat-calciomercato{background:rgba(96,165,250,0.10);color:#60a5fa;border:1px solid rgba(96,165,250,0.25);}
.news-item-title{font-family:'Barlow Condensed';font-size:17px;font-weight:800;color:var(--white);letter-spacing:0.5px;margin-bottom:5px;}
.news-item-body{font-family:'Barlow';font-size:14px;color:var(--t2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.news-item-meta{font-family:'Barlow Condensed';font-size:11px;color:var(--t3);letter-spacing:1px;margin-top:7px;}
.news-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.btn-del{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:#f87171;font-family:'Barlow Condensed';font-size:11px;font-weight:700;letter-spacing:1.5px;padding:6px 12px;border-radius:5px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.btn-del:hover{background:rgba(248,113,113,0.18);}
.btn-toggle{background:rgba(255,255,255,0.04);border:1px solid var(--bdr2);color:var(--t3);font-family:'Barlow Condensed';font-size:11px;font-weight:700;letter-spacing:1.5px;padding:6px 12px;border-radius:5px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.btn-toggle.active{background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.25);color:#4ade80;}
.news-item.hidden-news{opacity:0.45;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-mini{background:var(--d2);border:1px solid var(--bdr);border-radius:10px;padding:16px;text-align:center;}
.stat-mini-val{font-family:'Bebas Neue';font-size:38px;background:linear-gradient(135deg,#E8B84B,#C4962A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.stat-mini-lbl{font-family:'Barlow Condensed';font-size:11px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-top:4px;}
.fetch-btn{width:100%;padding:14px;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.25);border-radius:8px;font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;color:#4ade80;cursor:pointer;transition:all 0.2s;margin-bottom:20px;}
.fetch-btn:hover{background:rgba(74,222,128,0.15);}
.fetch-btn:disabled{opacity:0.4;cursor:default;}
.auto-badge{display:inline-block;font-family:'Barlow Condensed';font-size:10px;font-weight:700;letter-spacing:2px;color:#4ade80;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);padding:2px 7px;border-radius:3px;margin-left:6px;text-transform:uppercase;vertical-align:middle;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(196,150,42,0.95);color:#000;font-family:'Barlow Condensed';font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:12px 24px;border-radius:6px;opacity:0;transition:all 0.3s;z-index:300;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(196,150,42,0.3);border-top-color:var(--gold-l);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="hlogo">ICV</span>
    <span class="hbadge">Admin Panel</span>
  </div>
  <a href="https://icvscout.netlify.app" class="back-btn">&#8592; Scout</a>
</header>
<main>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-title">ACCESSO ADMIN</div>
  <div class="login-sub">Il Calcio di Vince &middot; Pannello Notizie</div>
  <input class="login-input" type="password" id="pwdInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkLogin()">
  <button class="login-btn" onclick="checkLogin()">ENTRA</button>
  <div class="login-err" id="loginErr">Password errata</div>
</div>

<!-- ADMIN -->
<div class="admin-panel" id="adminPanel">

  <div class="stats-row" id="statsRow">
    <div class="stat-mini"><div class="stat-mini-val" id="st-total">-</div><div class="stat-mini-lbl">Totale</div></div>
    <div class="stat-mini"><div class="stat-mini-val" id="st-vis">-</div><div class="stat-mini-lbl">Visibili</div></div>
    <div class="stat-mini"><div class="stat-mini-val" id="st-auto">-</div><div class="stat-mini-lbl">Auto</div></div>
  </div>

  <!-- AUTO FETCH -->
  <button class="fetch-btn" id="fetchBtn" onclick="fetchAutoNews()">
    &#9881; CERCA ULTIME NOTIZIE JUVENTUS
  </button>

  <!-- FORM MANUALE -->
  <div class="form-card">
    <div class="form-title">Nuova Notizia</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select class="form-select" id="newsCategory">
          <option value="juventus">Juventus</option>
          <option value="calciomercato">Calciomercato</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Urgenza</label>
        <select class="form-select" id="newsUrgency">
          <option value="normal">Normale</option>
          <option value="breaking">Breaking News</option>
          <option value="rumor">Rumor</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Titolo</label>
      <input class="form-input" type="text" id="newsTitle" placeholder="Es. Yildiz rinnova fino al 2029">
    </div>
    <div class="form-group">
      <label class="form-label">Testo</label>
      <textarea class="form-textarea" id="newsBody" placeholder="Scrivi la notizia..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Fonte (opzionale)</label>
      <input class="form-input" type="text" id="newsSource" placeholder="Es. Gazzetta dello Sport">
    </div>
    <button class="submit-btn" id="submitBtn" onclick="publishNews()">&#9654; PUBBLICA ORA</button>
  </div>

  <!-- LISTA -->
  <div class="news-section-title">Notizie Pubblicate</div>
  <div id="newsList"></div>

</div>
</main>
<div class="toast" id="toast"></div>

<script>
var ADMIN_PWD = "icv2026";
var SB_URL = "https://sdmmbpvvlgednafcrwtx.supabase.co";
var SB_KEY = "sb_publishable_VYxu6OFAg2Psdxkp5FWWGg_9O6qptu_";
var HEADERS = {"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY};

function checkLogin() {
  var pwd = document.getElementById("pwdInput").value;
  if (pwd === ADMIN_PWD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadNews();
  } else {
    var err = document.getElementById("loginErr");
    err.style.display = "block";
    setTimeout(function(){ err.style.display = "none"; }, 2000);
  }
}
document.getElementById("pwdInput").addEventListener("keydown", function(e){ if(e.key==="Enter") checkLogin(); });

// ── SUPABASE API ──
function sbFetch(path, method, body) {
  return fetch(SB_URL + "/rest/v1/" + path, {
    method: method || "GET",
    headers: Object.assign({}, HEADERS, method !== "GET" ? {"Prefer":"return=representation"} : {}),
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){ return r.json(); });
}

// ── LOAD NEWS ──
function loadNews() {
  sbFetch("news?order=created_at.desc&limit=50").then(function(data) {
    renderNews(Array.isArray(data) ? data : []);
  }).catch(function(e) {
    showToast("Errore caricamento");
    renderNews([]);
  });
}

// ── PUBLISH ──
function publishNews() {
  var title = document.getElementById("newsTitle").value.trim();
  var body = document.getElementById("newsBody").value.trim();
  var cat = document.getElementById("newsCategory").value;
  var urgency = document.getElementById("newsUrgency").value;
  var source = document.getElementById("newsSource").value.trim();
  if (!title) { showToast("Inserisci un titolo"); return; }
  if (!body)  { showToast("Inserisci il testo"); return; }
  var btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = "<span class='loading'></span>Pubblicazione...";
  sbFetch("news", "POST", {title:title, body:body, category:cat, urgency:urgency, source:source||null, visible:true, auto_fetched:false})
    .then(function() {
      document.getElementById("newsTitle").value = "";
      document.getElementById("newsBody").value = "";
      document.getElementById("newsSource").value = "";
      btn.disabled = false;
      btn.innerHTML = "&#9654; PUBBLICA ORA";
      showToast("Notizia pubblicata!");
      loadNews();
    }).catch(function() {
      btn.disabled = false;
      btn.innerHTML = "&#9654; PUBBLICA ORA";
      showToast("Errore pubblicazione");
    });
}

// ── TOGGLE VISIBILITY ──
function toggleNews(id, current) {
  sbFetch("news?id=eq."+id, "PATCH", {visible: !current})
    .then(function(){ loadNews(); showToast(current ? "Notizia nascosta" : "Notizia visibile"); });
}

// ── DELETE ──
function deleteNews(id) {
  if (!confirm("Eliminare questa notizia?")) return;
  sbFetch("news?id=eq."+id, "DELETE")
    .then(function(){ loadNews(); showToast("Eliminata"); });
}

// ── AUTO FETCH NEWS ──
var RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";

var FEEDS = [
  {
    url: "https://news.google.com/rss/search?q=Juventus+calcio&hl=it&gl=IT&ceid=IT:it",
    cat: "juventus",
    sourceMode: "google"   // titolo formato "Articolo - Fonte"
  },
  {
    url: "https://news.google.com/rss/search?q=Juventus+calciomercato&hl=it&gl=IT&ceid=IT:it",
    cat: "calciomercato",
    sourceMode: "google"
  },
  {
    url: "https://www.gazzetta.it/rss/Juventus.xml",
    cat: "juventus",
    sourceMode: "direct",
    label: "Gazzetta dello Sport"
  },
  {
    url: "https://feeds.footballco.com/ilbianconero/feed/x2mb7fql9vce6t1p",
    cat: "juventus",
    sourceMode: "direct",
    label: "Il Bianconero",
    fetchMode: "xml"  // CORS aperto, fetch diretto senza proxy
  }
];

function parseItem(item, feed) {
  var raw = (item.title || "").trim();
  var title, source;
  if (feed.sourceMode === "google") {
    var parts = raw.match(/^(.+?)\s+-\s+([^-]{3,50})$/);
    title  = parts ? parts[1].trim() : raw;
    source = parts ? parts[2].trim() : "Google News";
  } else {
    title  = raw;
    source = feed.label;
  }
  var desc = (item.description || item.content || "").replace(/<[^>]+>/g, "").replace(/\s+/g, " ").trim().slice(0, 300);
  if (!desc) desc = title;
  return { title: title, source: source, desc: desc };
}

function delay(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

function fetchOneFeed(feed) {
  var promise;

  if (feed.fetchMode === "xml") {
    promise = fetch(feed.url)
      .then(function(r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(function(xml) {
        var doc = new DOMParser().parseFromString(xml, "text/xml");
        if (doc.querySelector("parsererror")) throw new Error("XML non valido");
        var nodes = Array.prototype.slice.call(doc.querySelectorAll("item"), 0, 3);
        if (!nodes.length) throw new Error("Feed vuoto");
        return nodes.map(function(node) {
          var t = node.querySelector("title");
          var d = node.querySelector("description");
          return {
            title: t ? t.textContent.trim() : "",
            description: d ? d.textContent : ""
          };
        });
      });
  } else {
    promise = fetch(RSS2JSON + encodeURIComponent(feed.url))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.status !== "ok") throw new Error(data.message || "Feed non disponibile");
        var items = (data.items || []).slice(0, 3);
        if (!items.length) throw new Error("Feed vuoto");
        return items;
      });
  }

  return promise.then(function(items) {
    return Promise.all(items.map(function(item) {
      var p = parseItem(item, feed);
      if (!p.title) return Promise.resolve(0);
      return sbFetch("news", "POST", {
        title: p.title, body: p.desc, category: feed.cat,
        urgency: "normal", source: p.source,
        visible: false, auto_fetched: true
      }).then(function(){ return 1; });
    }));
  }).then(function(results) {
    return (results || []).reduce(function(s, v){ return s + (v||0); }, 0);
  });
}

function fetchAutoNews() {
  var btn = document.getElementById("fetchBtn");
  btn.disabled = true;
  btn.innerHTML = "<span class='loading'></span>Ricerca notizie in corso...";

  var added = 0;
  var errors = [];

  // Fetch sequenziale con pausa tra un feed e l'altro
  FEEDS.reduce(function(chain, feed, i) {
    return chain
      .then(function() { return i > 0 ? delay(700) : Promise.resolve(); })
      .then(function() {
        btn.innerHTML = "<span class='loading'></span>" + (feed.label || "Google News") + "...";
        return fetchOneFeed(feed);
      })
      .then(function(n) { added += n; })
      .catch(function(err) {
        errors.push((feed.label || "Google News") + ": " + (err.message || "errore"));
        console.error("RSS [" + (feed.label || feed.url) + "]:", err);
      });
  }, Promise.resolve()).then(function() {
    btn.disabled = false;
    btn.innerHTML = "&#9881; CERCA ULTIME NOTIZIE JUVENTUS";
    showToast(added ? added + " notizie trovate - approva dal pannello" : "Nessuna notizia trovata - riprova");
    if (errors.length) console.warn("Feed con errori:", errors);
    loadNews();
  });
}

// ── RENDER ──
function renderNews(news) {
  document.getElementById("st-total").textContent = news.length;
  document.getElementById("st-vis").textContent = news.filter(function(n){ return n.visible; }).length;
  document.getElementById("st-auto").textContent = news.filter(function(n){ return n.auto_fetched; }).length;

  var list = document.getElementById("newsList");
  if (!news.length) {
    list.innerHTML = "<div class='news-empty'>Nessuna notizia. Usa il form o il fetch automatico.</div>";
    return;
  }
  list.innerHTML = "";
  news.forEach(function(n) {
    var catCls = n.category === "juventus" ? "cat-juventus" : "cat-calciomercato";
    var catLabel = n.category === "juventus" ? "Juventus" : "Calciomercato";
    var d = new Date(n.created_at);
    var dateStr = d.toLocaleDateString("it-IT",{day:"2-digit",month:"short"}) + " " + d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
    var autoBadge = n.auto_fetched ? "<span class='auto-badge'>Auto</span>" : "";
    var urgBadge = n.urgency === "breaking" ? " <span style='color:#f87171;font-size:11px;font-weight:700;'>BREAKING</span>" : n.urgency === "rumor" ? " <span style='color:#fbbf24;font-size:11px;font-weight:700;'>RUMOR</span>" : "";
    var item = document.createElement("div");
    item.className = "news-item" + (n.visible ? "" : " hidden-news");
    item.innerHTML =
      "<div class='news-item-content'>" +
        "<span class='news-cat "+catCls+"'>"+catLabel+"</span>" + autoBadge +
        "<div class='news-item-title'>"+n.title+urgBadge+"</div>" +
        "<div class='news-item-body'>"+n.body+"</div>" +
        "<div class='news-item-meta'>"+dateStr+(n.source?" &middot; "+n.source:"")+" &middot; <span style='color:"+(n.visible?"#4ade80":"var(--t3)")+"'>"+(n.visible?"Visibile":"In attesa")+"</span></div>" +
      "</div>" +
      "<div class='news-actions'>" +
        "<button class='btn-toggle"+(n.visible?" active":"")+"' onclick='toggleNews("+n.id+","+n.visible+")'>"+(n.visible?"Nascondi":"Approva")+"</button>" +
        "<button class='btn-del' onclick='deleteNews("+n.id+")'>Elimina</button>" +
      "</div>";
    list.appendChild(item);
  });
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}
</script>
</body>
</html>
