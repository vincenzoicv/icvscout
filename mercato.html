<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Radar mercato Juventus di ICV Scout: temi, fonti e aggiornamenti editoriali.">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C4962A">

<meta name="application-name" content="ICV Scout">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ICV Scout">

<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-startup-image" href="/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
<link rel="apple-touch-startup-image" href="/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C4962A;--gold-l:#E8B84B;--black:#050505;--d1:#0b0b0b;--d2:#151515;--d3:#1d1d1d;--white:#f4f1ea;--t2:rgba(255,255,255,.68);--t3:rgba(255,255,255,.42);--bdr:rgba(196,150,42,.18);--bdr2:rgba(255,255,255,.08);--green:#4ade80;--red:#f87171;--blue:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:radial-gradient(circle at 50% -12%,rgba(196,150,42,.13),transparent 34%),var(--black);color:var(--white);font-family:Barlow,sans-serif}
body:before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;pointer-events:none}
body.light{background:#f4f2ec;color:#111;--black:#f4f2ec;--d1:#f4f2ec;--d2:#e8e5dc;--d3:#ddd7cc;--white:#111;--t2:rgba(0,0,0,.66);--t3:rgba(0,0,0,.46);--bdr:rgba(196,150,42,.24);--bdr2:rgba(0,0,0,.08)}
header{position:sticky;top:0;z-index:10;height:64px;border-bottom:1px solid var(--bdr);background:rgba(5,5,5,.94);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:space-between;padding:0 22px}
body.light header{background:rgba(244,242,236,.95)}
.brand{display:flex;flex-direction:column;line-height:.95;text-decoration:none}.brand strong{font-family:"Bebas Neue";font-size:22px;letter-spacing:2.5px;color:var(--gold-l)}.brand span{font-family:"Barlow Condensed";font-size:10px;font-weight:800;letter-spacing:3px;color:var(--t2);text-transform:uppercase}
nav{display:flex;gap:8px;align-items:center}nav a,button.mode{font-family:"Barlow Condensed";font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t2);text-decoration:none;border:1px solid var(--bdr2);border-radius:999px;padding:9px 13px;background:rgba(255,255,255,.04);cursor:pointer;transition:all .22s ease}
nav a:hover,nav a.active,button.mode:hover{color:var(--gold-l);border-color:rgba(196,150,42,.38);background:rgba(196,150,42,.12)}
body.light nav a,body.light button.mode{background:rgba(255,255,255,.52);color:rgba(0,0,0,.56)}
body.light nav a:hover,body.light nav a.active,body.light button.mode:hover{color:#8B6520;background:rgba(255,255,255,.78)}
main{max-width:1180px;margin:0 auto;padding:58px 20px 80px}
.hero{margin-bottom:26px}.eyebrow{font-family:"Barlow Condensed";font-size:13px;font-weight:900;letter-spacing:4px;text-transform:uppercase;color:var(--gold-l);margin-bottom:10px}.hero h1{font-family:"Bebas Neue";font-size:clamp(72px,12vw,150px);letter-spacing:4px;line-height:.82}.bar{width:54px;height:2px;background:var(--gold-l);margin-top:22px}
.grid{display:grid;grid-template-columns:1fr;gap:14px}
.group{background:var(--d2);border:1px solid var(--bdr);border-radius:14px;padding:16px;min-height:180px}.group-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-bottom:1px solid var(--bdr2);padding-bottom:12px;margin-bottom:8px}.group-title{font-family:"Barlow Condensed";font-size:13px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--gold-l)}.group-count{font-family:"Bebas Neue";font-size:34px;color:var(--gold-l);line-height:1}
.item{display:grid;grid-template-columns:36px 1fr;gap:11px;align-items:start;padding:14px 0;border-bottom:1px solid var(--bdr2)}.item:last-child{border-bottom:none}.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--d3);border:1px solid var(--bdr2);font-family:"Bebas Neue";font-size:13px;color:var(--t2)}.item h3{font-family:"Barlow Condensed";font-size:20px;font-weight:900;line-height:1.05;color:var(--white);margin-bottom:4px}.item p{font-size:14px;line-height:1.42;color:var(--t2);max-width:760px}.meta{font-family:"Barlow Condensed";font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-top:6px}.econ-context{display:inline-flex;gap:6px;align-items:center;margin-top:8px;border:1px solid rgba(196,150,42,.24);border-radius:999px;background:rgba(196,150,42,.08);padding:5px 8px;font-family:"Barlow Condensed";font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold-l)}
.empty{border:1px dashed var(--bdr2);border-radius:12px;background:rgba(255,255,255,.025);padding:34px 20px;text-align:center;color:var(--t3);font-family:"Barlow Condensed";font-size:15px;letter-spacing:2px;text-transform:uppercase}
footer{border-top:1px solid var(--bdr);padding:18px 22px;color:var(--t3);font-family:"Barlow Condensed";font-size:11px;letter-spacing:2px;text-transform:uppercase;display:flex;justify-content:space-between;gap:12px}
@media(max-width:840px){header{height:auto;min-height:62px;padding:12px 14px;gap:12px;align-items:flex-start}nav{flex-wrap:wrap;justify-content:flex-end}.grid{grid-template-columns:1fr}main{padding:36px 14px 64px}.item{grid-template-columns:34px 1fr}.hero h1{font-size:76px}footer{flex-direction:column}}
</style>
</head>
<body>
<header>
  <a class="brand" href="index.html"><strong>ICV Scout</strong><span>Il Calcio di Vince</span></a>
  <nav>
    <a href="index.html">Home</a>
    <a class="active" href="mercato.html">Mercato</a>
    <a href="grafiche.html">Grafiche</a>
    <a href="index.html#news">News</a>
    <button class="mode" type="button" onclick="toggleTheme()" id="themeButton">Day</button>
  </nav>
</header>
<main>
  <section class="hero">
    <div class="eyebrow">Estate 2026</div>
    <h1>Mercato</h1>
    <div class="bar"></div>
  </section>

  <section class="grid" id="marketGroups">
    <div class="empty" style="grid-column:1/-1">Caricamento mercato</div>
  </section>
</main>
<footer>
  <span>© 2026 Il Calcio di Vince · ICV Scout</span>
  <span>@ilcalciodivince_</span>
</footer>
<script>
function esc(value){return String(value == null ? "" : value).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
function textOf(item){return [item.player_name,item.note,item.source_name].join(" ").toLowerCase();}
function initials(name){return String(name || "M").trim().split(/\s+/).slice(0,2).map(function(p){return p.charAt(0);}).join("").toUpperCase() || "M";}
function isNoiseItem(item){
  var name = String(item.player_name || "").toLowerCase();
  var t = textOf(item);
  if (/^pap$|^papa$|^marzio$|^di marzio$|luca toselli|romeo agresti|gianni balzarini/.test(name)) return true;
  if (/youtube scout:/.test(t)) return true;
  if (/maradona|ferlaino|salas|cristiano ronaldo alla juventus sfumo/.test(t)) return true;
  return false;
}
function economicContext(title){
  var key = String(title || "").toLowerCase();
  var rows = [
    {re:/vlahovic|dusan|dušan/,label:"Impatto ingaggio alto"},
    {re:/kolo\s*muani|muani/,label:"Impatto ingaggio alto"},
    {re:/goretzka/,label:"Impatto ingaggio alto"},
    {re:/openda/,label:"Impatto ingaggio medio-alto"},
    {re:/sorloth|sorlot/,label:"Impatto ingaggio medio"},
    {re:/cambiaso/,label:"Impatto ingaggio medio"}
  ];
  for(var i=0;i<rows.length;i++){
    if(rows[i].re.test(key)) return rows[i].label;
  }
  return "";
}
function itemHtml(item){
  var title = displayTitle(item);
  var note = item.note || title;
  var source = item.source_name || "ICV";
  var sourceLabel = Number(item.source_count || 0) > 1 ? item.source_count + " fonti: " + source : source;
  var econ = economicContext(title);
  var econHtml = econ ? "<div class='econ-context'>Capology · "+esc(econ)+" · dato stimato</div>" : "";
  return "<article class='item'><div class='avatar'>"+esc(initials(title))+"</div><div><h3>"+esc(title)+"</h3><p>"+esc(note)+"</p><div class='meta'>"+esc(sourceLabel)+"</div>"+econHtml+"</div></article>";
}
function displayTitle(item){
  var raw = String(item.player_name || "").trim();
  var note = String(item.note || "");
  var text = [raw,note,item.source_name || ""].join(" ");
  if (/youtube scout|^scout$/i.test(raw) && /sorloth|sorlot/i.test(text)) return "Sorloth";
  if (/youtube scout|^scout$/i.test(raw) && /vlahovic/i.test(text)) return "Vlahovic";
  if (/^perch/i.test(raw) && /alisson/i.test(note)) return "Alisson";
  if (/^marzio$|^di marzio$/i.test(raw)) return "Punto mercato";
  return raw || "Mercato Juve";
}
function renderTopics(rows){
  var body = rows.length ? rows.slice(0,12).map(itemHtml).join("") : "<div class='empty'>Nessun tema mercato disponibile</div>";
  document.getElementById("marketGroups").innerHTML = "<section class='group'><div class='group-head'><div class='group-title'>Temi mercato</div><div class='group-count'>"+rows.length+"</div></div>"+body+"</section>";
}
var allRows = [];
function loadMarket(){
  fetch("/api/public/home").then(function(r){return r.json();}).then(function(data){
    allRows = (Array.isArray(data.market) ? data.market : []).filter(function(item){return !isNoiseItem(item);});
    renderTopics(allRows);
  }).catch(function(){
    document.getElementById("marketGroups").innerHTML = "<div class='empty' style='grid-column:1/-1'>Mercato non disponibile</div>";
  });
}
function refreshThemeButton(){
  var btn=document.getElementById("themeButton");
  if(btn) btn.textContent=document.body.classList.contains("light") ? "Night" : "Day";
}
function toggleTheme(){
  var light=document.body.classList.toggle("light");
  try{localStorage.setItem("icv-theme",light?"light":"dark");}catch(e){}
  refreshThemeButton();
}
try{if(localStorage.getItem("icv-theme")==="light")document.body.classList.add("light");}catch(e){}
refreshThemeButton();
loadMarket();
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}
</script>
</body>
</html>
