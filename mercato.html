<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Radar mercato Juventus di ICV Scout: rumor, fonti, arrivi, uscite e temi da monitorare.">
<title>Mercato ICV - Il Calcio di Vince</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C4962A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ICV Scout">
<link rel="apple-touch-icon" href="/icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C4962A;--gold-l:#E8B84B;--black:#050505;--d1:#0b0b0b;--d2:#151515;--d3:#1d1d1d;--white:#f4f1ea;--t2:rgba(255,255,255,.68);--t3:rgba(255,255,255,.42);--bdr:rgba(196,150,42,.18);--bdr2:rgba(255,255,255,.08);--green:#4ade80;--red:#f87171;--blue:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:radial-gradient(circle at 50% -12%,rgba(196,150,42,.13),transparent 34%),var(--black);color:var(--white);font-family:Barlow,sans-serif}
body:before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;pointer-events:none}
body.light{background:#f4f2ec;color:#111;--black:#f4f2ec;--d1:#f4f2ec;--d2:#e8e5dc;--d3:#ddd7cc;--white:#111;--t2:rgba(0,0,0,.66);--t3:rgba(0,0,0,.46);--bdr:rgba(196,150,42,.24);--bdr2:rgba(0,0,0,.08)}
header{position:sticky;top:0;z-index:10;height:64px;border-bottom:1px solid var(--bdr);background:rgba(5,5,5,.94);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:space-between;padding:0 22px}
body.light header{background:rgba(244,242,236,.95)}
.brand{display:flex;flex-direction:column;line-height:.95;text-decoration:none}.brand strong{font-family:"Bebas Neue";font-size:22px;letter-spacing:2.5px;color:var(--gold-l)}.brand span{font-family:"Barlow Condensed";font-size:10px;font-weight:800;letter-spacing:3px;color:var(--t2);text-transform:uppercase}
nav{display:flex;gap:8px;align-items:center}nav a,button.mode{font-family:"Barlow Condensed";font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t2);text-decoration:none;border:1px solid var(--bdr2);border-radius:999px;padding:9px 13px;background:rgba(255,255,255,.04);cursor:pointer;transition:all .22s ease}
nav a:hover,nav a.active,button.mode:hover{color:var(--gold-l);border-color:rgba(196,150,42,.38);background:rgba(196,150,42,.12)}
body.light nav a,body.light button.mode{background:rgba(255,255,255,.52);color:rgba(0,0,0,.56)}
body.light nav a:hover,body.light nav a.active,body.light button.mode:hover{color:#8B6520;background:rgba(255,255,255,.78)}
main{max-width:1180px;margin:0 auto;padding:58px 20px 80px}
.hero{margin-bottom:26px}.eyebrow{font-family:"Barlow Condensed";font-size:13px;font-weight:900;letter-spacing:4px;text-transform:uppercase;color:var(--gold-l);margin-bottom:10px}.hero h1{font-family:"Bebas Neue";font-size:clamp(72px,12vw,150px);letter-spacing:4px;line-height:.82}.bar{width:54px;height:2px;background:var(--gold-l);margin-top:22px}
.summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:26px 0}
.summary-card{background:var(--d2);border:1px solid var(--bdr);border-radius:14px;padding:16px;min-height:92px}.summary-card strong{display:block;font-family:"Bebas Neue";font-size:42px;color:var(--gold-l);line-height:1}.summary-card span{display:block;font-family:"Barlow Condensed";font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-top:5px}.summary-card p{color:var(--t2);line-height:1.55;font-size:15px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 22px}.tab{border:1px solid var(--bdr2);background:rgba(255,255,255,.04);color:var(--t2);font-family:"Barlow Condensed";font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase;border-radius:999px;padding:10px 14px;cursor:pointer}.tab.active{color:var(--gold-l);border-color:rgba(196,150,42,.42);background:rgba(196,150,42,.13)}
body.light .tab{background:rgba(255,255,255,.50);color:rgba(0,0,0,.52)}body.light .tab.active{color:#8B6520;background:rgba(255,255,255,.78)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.group{background:var(--d2);border:1px solid var(--bdr);border-radius:14px;padding:16px;min-height:180px}.group-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-bottom:1px solid var(--bdr2);padding-bottom:12px;margin-bottom:8px}.group-title{font-family:"Barlow Condensed";font-size:13px;font-weight:900;letter-spacing:3px;text-transform:uppercase}.group-title.arrivi{color:var(--green)}.group-title.uscite{color:var(--red)}.group-title.rinnovi{color:var(--blue)}.group-title.monitorare{color:var(--gold-l)}.group-count{font-family:"Bebas Neue";font-size:34px;color:var(--gold-l);line-height:1}
.item{display:grid;grid-template-columns:36px 1fr auto;gap:11px;align-items:center;padding:12px 0;border-bottom:1px solid var(--bdr2)}.item:last-child{border-bottom:none}.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--d3);border:1px solid var(--bdr2);font-family:"Bebas Neue";font-size:13px;color:var(--t2)}.item h3{font-family:"Barlow Condensed";font-size:18px;font-weight:900;line-height:1.05;color:var(--white);margin-bottom:3px}.item p{font-size:13px;line-height:1.35;color:var(--t2);max-width:560px}.meta{font-family:"Barlow Condensed";font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-top:4px}.badge{font-family:"Barlow Condensed";font-size:10px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase;border:1px solid rgba(96,165,250,.28);background:rgba(96,165,250,.11);color:var(--blue);border-radius:5px;padding:4px 7px;white-space:nowrap}.badge.hot{border-color:rgba(248,113,113,.28);background:rgba(248,113,113,.10);color:var(--red)}.badge.good{border-color:rgba(74,222,128,.28);background:rgba(74,222,128,.10);color:var(--green)}
.timeline{margin-top:18px;background:var(--d2);border:1px solid var(--bdr);border-radius:14px;padding:16px}.timeline h2{font-family:"Barlow Condensed";font-size:13px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--gold-l);margin-bottom:8px}.empty{border:1px dashed var(--bdr2);border-radius:12px;background:rgba(255,255,255,.025);padding:34px 20px;text-align:center;color:var(--t3);font-family:"Barlow Condensed";font-size:15px;letter-spacing:2px;text-transform:uppercase}
footer{border-top:1px solid var(--bdr);padding:18px 22px;color:var(--t3);font-family:"Barlow Condensed";font-size:11px;letter-spacing:2px;text-transform:uppercase;display:flex;justify-content:space-between;gap:12px}
@media(max-width:840px){header{height:auto;min-height:62px;padding:12px 14px;gap:12px;align-items:flex-start}nav{flex-wrap:wrap;justify-content:flex-end}.summary{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}main{padding:36px 14px 64px}.item{grid-template-columns:34px 1fr}.badge{grid-column:2;justify-self:start}.hero h1{font-size:76px}footer{flex-direction:column}}
</style>
</head>
<body>
<header>
  <a class="brand" href="index.html"><strong>ICV Scout</strong><span>Il Calcio di Vince</span></a>
  <nav>
    <a href="index.html">Home</a>
    <a class="active" href="mercato.html">Mercato</a>
    <a href="grafiche.html">Grafiche</a>
    <a href="index.html#news">News</a>
    <button class="mode" type="button" onclick="toggleTheme()" id="themeButton">Day</button>
  </nav>
</header>
<main>
  <section class="hero">
    <div class="eyebrow">Estate 2026</div>
    <h1>Mercato</h1>
    <div class="bar"></div>
  </section>

  <section class="summary">
    <div class="summary-card"><strong id="totalCount">0</strong><span>Segnali</span></div>
    <div class="summary-card"><strong id="sourceCount">0</strong><span>Fonti</span></div>
    <div class="summary-card"><strong id="hotCount">0</strong><span>Caldi</span></div>
  </section>

  <div class="tabs" id="marketTabs">
    <button class="tab active" data-filter="all">Tutto</button>
    <button class="tab" data-filter="arrivi">Arrivi</button>
    <button class="tab" data-filter="uscite">Uscite</button>
    <button class="tab" data-filter="rinnovi">Rinnovi / Staff</button>
    <button class="tab" data-filter="monitorare">Da monitorare</button>
  </div>

  <section class="grid" id="marketGroups">
    <div class="empty" style="grid-column:1/-1">Caricamento mercato</div>
  </section>

  <section class="timeline">
    <h2>Flusso automatico</h2>
    <div id="marketTimeline"><div class="empty">Caricamento aggiornamenti</div></div>
  </section>
</main>
<footer>
  <span>© 2026 Il Calcio di Vince · ICV Scout</span>
  <span>@ilcalciodivince_</span>
</footer>
<script>
function esc(value){return String(value == null ? "" : value).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
function textOf(item){return [item.player_name,item.note,item.source_name,item.status].join(" ").toLowerCase();}
function initials(name){return String(name || "M").trim().split(/\s+/).slice(0,2).map(function(p){return p.charAt(0);}).join("").toUpperCase() || "M";}
function categoryFor(item){
  var name = String(item.player_name || "").toLowerCase();
  var t = textOf(item);
  if (/^perch/.test(name) && /alisson/.test(t)) return "arrivi";
  if (/spalletti|comolli|management|dirigenza|staff/.test(name)) return "rinnovi";
  if (/icardi|alisson|mamardashvili|de gea|robertson|brahim|kim|emerson/.test(name)) return "arrivi";
  if (/vlahovic|bremer|cambiaso|douglas|nico gonzalez/.test(name)) return "uscite";
  if (/rinnovo|contratto|management|allenatore|dirigenza|proprieta|staff/.test(t)) return "rinnovi";
  if (/sostituto|obiettivo|acquisto|arrivo|trattativa in salita/.test(t)) return "arrivi";
  if (/cessione|uscita|addio|sacrific|lascia|puo lasciare|può lasciare|parte|premier|bayern|barcellona/.test(t)) return "uscite";
  return "monitorare";
}
function hotFor(item){
  var t = textOf(item);
  return /accordo|chiusura|video|cruciale|salita|frena|riunione|incontro|ritorno|addio|cessione/.test(t);
}
function groupRows(rows){
  var map = {arrivi:[], uscite:[], rinnovi:[], monitorare:[]};
  rows.forEach(function(item){map[categoryFor(item)].push(item);});
  return map;
}
function itemHtml(item){
  var title = displayTitle(item);
  var note = item.note || title;
  var source = item.source_name || "ICV";
  var status = item.status || "monitorato";
  var hot = hotFor(item);
  var trusted = /gianluca|sky|bianconero|ufficiale/i.test(source);
  var badge = trusted ? "good" : (hot ? "hot" : "");
  return "<article class='item'><div class='avatar'>"+esc(initials(title))+"</div><div><h3>"+esc(title)+"</h3><p>"+esc(note)+"</p><div class='meta'>"+esc(source)+"</div></div><span class='badge "+badge+"'>"+esc(status)+"</span></article>";
}
function displayTitle(item){
  var raw = String(item.player_name || "").trim();
  var note = String(item.note || "");
  if (/^perch/i.test(raw) && /alisson/i.test(note)) return "Alisson";
  if (/^marzio$/i.test(raw) && /mercato juve/i.test(note)) return "Punto mercato";
  return raw || "Mercato Juve";
}
function renderGroups(rows, filter){
  var groups = groupRows(rows);
  var labels = {
    arrivi:["Possibili arrivi","arrivi"],
    uscite:["Possibili uscite","uscite"],
    rinnovi:["Rinnovi / staff","rinnovi"],
    monitorare:["Da monitorare","monitorare"]
  };
  var keys = filter && filter !== "all" ? [filter] : ["arrivi","uscite","rinnovi","monitorare"];
  var html = keys.map(function(key){
    var items = groups[key] || [];
    var body = items.length ? items.slice(0,6).map(itemHtml).join("") : "<div class='empty'>Nessun segnale in questo gruppo</div>";
    return "<section class='group'><div class='group-head'><div class='group-title "+labels[key][1]+"'>"+labels[key][0]+"</div><div class='group-count'>"+items.length+"</div></div>"+body+"</section>";
  }).join("");
  document.getElementById("marketGroups").innerHTML = html;
}
function renderTimeline(rows){
  var el = document.getElementById("marketTimeline");
  if(!rows.length){el.innerHTML = "<div class='empty'>Nessun aggiornamento mercato disponibile</div>";return;}
  el.innerHTML = rows.slice(0,10).map(itemHtml).join("");
}
function renderSummary(rows){
  var sources = {};
  rows.forEach(function(item){if(item.source_name)sources[item.source_name]=true;});
  document.getElementById("totalCount").textContent = rows.length;
  document.getElementById("sourceCount").textContent = Object.keys(sources).length;
  document.getElementById("hotCount").textContent = rows.filter(hotFor).length;
}
var allRows = [];
function loadMarket(){
  fetch("/api/public/home").then(function(r){return r.json();}).then(function(data){
    allRows = Array.isArray(data.market) ? data.market : [];
    renderSummary(allRows);
    renderGroups(allRows, "all");
    renderTimeline(allRows);
  }).catch(function(){
    document.getElementById("marketGroups").innerHTML = "<div class='empty' style='grid-column:1/-1'>Mercato non disponibile</div>";
    document.getElementById("marketTimeline").innerHTML = "<div class='empty'>Errore caricamento aggiornamenti</div>";
  });
}
document.getElementById("marketTabs").addEventListener("click",function(e){
  if(!e.target.classList.contains("tab"))return;
  Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(btn){btn.classList.remove("active");});
  e.target.classList.add("active");
  renderGroups(allRows,e.target.dataset.filter);
});
function refreshThemeButton(){
  var btn=document.getElementById("themeButton");
  if(btn) btn.textContent=document.body.classList.contains("light") ? "Night" : "Day";
}
function toggleTheme(){
  var light=document.body.classList.toggle("light");
  try{localStorage.setItem("icv-theme",light?"light":"dark");}catch(e){}
  refreshThemeButton();
}
try{if(localStorage.getItem("icv-theme")==="light")document.body.classList.add("light");}catch(e){}
refreshThemeButton();
loadMarket();
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}
</script>
</body>
</html>
